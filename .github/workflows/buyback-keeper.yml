name: buyback-keeper
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}
concurrency:
  group: buyback-keeper
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm i ethers@^6.13.0
      - run: node buyback-keeper.mjs
        env:
          RPC_URL: ${{ vars.RPC_URL }}
          KEEPER_PK: ${{ secrets.KEEPER_PK }}
          VAULT: ${{ vars.VAULT }}
